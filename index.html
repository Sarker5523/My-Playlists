<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShelf</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0A0A0A; color: #e8e8e8; font-family: 'Inter', sans-serif; }

        /* ── Toggle ── */
        .mode-toggle {
            display: flex; align-items: center;
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 8px; padding: 3px; gap: 2px;
        }
        .mode-btn {
            padding: 6px 18px; border: none; border-radius: 6px;
            font-size: 12px; font-weight: 700; cursor: pointer;
            transition: background 0.18s, color 0.18s; background: transparent; color: #666;
            letter-spacing: 0.5px;
        }
        .mode-btn.active-jav { background: #E50914; color: #fff; }
        .mode-btn.active-irl { background: #7c3aed; color: #fff; }
        .mode-btn:not(.active-jav):not(.active-irl):hover { color: #ccc; }

        /* ── Sort ── */
        #sort-wrap { display: none; }
        #sort-select {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
            color: #e8e8e8; padding: 7px 10px; font-size: 12px; font-weight: 700;
            cursor: pointer; outline: none; transition: border-color 0.18s;
        }
        #sort-select:focus { border-color: #7c3aed; }
        #sort-select.jav-sort:focus { border-color: #E50914; }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px 16px;
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 16px 12px; }
        }

        /* ── Card ── */
        .card {
            background: #141414; border-radius: 8px; overflow: hidden;
            display: flex; flex-direction: column; transition: all 0.22s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .card:hover { transform: scale(1.04) translateY(-4px); }
        .card.jav-card:hover { box-shadow: 0 8px 32px rgba(229,9,20,0.28), 0 2px 8px rgba(0,0,0,0.5); }
        .card.irl-card:hover { box-shadow: 0 8px 32px rgba(124,58,237,0.32), 0 2px 8px rgba(0,0,0,0.5); }

        .poster-container {
            position: relative; padding-top: 56.25%;
            background: #0f0f0f; overflow: hidden;
        }
        .poster-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }
        .fallback {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            background: linear-gradient(135deg, #1a0a0a, #1a1a2a);
        }

        .badge {
            position: absolute; top: 8px; left: 8px;
            color: #fff; font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 3px;
        }
        .badge-jav { background: rgba(229,9,20,0.92); }
        .badge-irl { background: rgba(124,58,237,0.92); }

        .card-body {
            padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px;
        }
        .card-title {
            font-size: 13px; font-weight: 600; line-height: 1.4;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .card-meta { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
        .meta-row {
            font-size: 11px; color: #888; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .meta-label { color: #555; font-weight: 600; margin-right: 3px; }
        .meta-performers { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .copy-btn {
            margin-top: 6px; padding: 7px 0; background: #222; color: #fff;
            border: none; border-radius: 5px; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: background 0.18s; width: 100%;
        }
        .copy-btn:hover { background: #E50914; }
        .copy-btn.irl:hover { background: #7c3aed; }
        .copy-btn.success { background: #1a6b1a !important; }

        /* Skeleton */
        .skeleton {
            background: #141414; border-radius: 8px; overflow: hidden;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-img { padding-top: 56.25%; background: #1f1f1f; }
        .skeleton-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
        .skeleton-line { height: 12px; background: #222; border-radius: 4px; }
        .skeleton-line.short { width: 60%; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; gap: 8px;
            margin: 40px 0; flex-wrap: wrap; align-items: center;
        }
        .pagination button {
            background: #222; color: #fff; border: none;
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600;
            min-width: 38px; transition: background 0.18s;
        }
        .pagination button:hover:not(:disabled) { background: #333; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination button.active-jav { background: #E50914; }
        .pagination button.active-irl { background: #7c3aed; }
        .pagination .ellipsis { color: #555; padding: 8px 4px; font-weight: 700; }

        /* Search */
        .search-wrap { position: relative; }
        .search-wrap input {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
            color: #e8e8e8; padding: 8px 32px 8px 32px; font-size: 13px;
            outline: none; width: 240px; transition: border-color 0.18s;
        }
        .search-wrap input:focus { border-color: #E50914; }
        .search-wrap input.irl-focus:focus { border-color: #7c3aed; }
        .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #666; font-size: 14px; pointer-events: none; }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: #666; background: none; border: none; cursor: pointer;
            font-size: 16px; line-height: 1; padding: 0; display: none; transition: color 0.15s;
        }
        .search-clear:hover { color: #E50914; }

        /* Back to top */
        #back-to-top {
            position: fixed; bottom: 28px; right: 28px;
            background: #E50914; color: #fff; border: none; border-radius: 50%;
            width: 44px; height: 44px; font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 16px rgba(229,9,20,0.4); opacity: 0;
            transition: opacity 0.25s, transform 0.25s, background 0.25s; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #back-to-top.visible { opacity: 1; pointer-events: all; }
        #back-to-top:hover { transform: translateY(-3px); }
        #back-to-top.irl { background: #7c3aed; box-shadow: 0 4px 16px rgba(124,58,237,0.4); }

        /* IRL spinner */
        .irl-loading {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 12px 0 4px; font-size: 12px; color: #666;
        }
        .spinner {
            width: 14px; height: 14px; border: 2px solid #333;
            border-top-color: #7c3aed; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .spinner.jav-spin { border-top-color: #E50914; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Date-fetch progress */
        #date-fetch-status {
            display: none; align-items: center; gap: 10px;
            font-size: 12px; color: #666; padding: 4px 0;
        }
        #date-fetch-status .spinner { border-top-color: #E50914; }
        #date-fetch-status.irl-fetch .spinner { border-top-color: #7c3aed; }

        /* Source tag on card */
        .source-tag {
            position: absolute; bottom: 6px; right: 6px;
            font-size: 9px; font-weight: 700; padding: 2px 5px;
            border-radius: 3px; letter-spacing: 0.5px; opacity: 0.85;
        }
        .source-r18   { background: #1a3a6b; color: #7ab3ff; }
        .source-dmm   { background: #1a2a1a; color: #6bcc6b; }
        .source-javlib { background: #2a1a2a; color: #cc88ff; }
        .source-local { background: #2a2a1a; color: #ccaa44; }
    </style>
</head>
<body>
<div style="min-height:100vh;background:#0A0A0A;">

    <!-- Header -->
    <header style="padding:0 clamp(16px,5vw,56px);background:linear-gradient(to bottom,#000 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);border-bottom:1px solid #1a1a1a;">
        <div style="display:flex;align-items:center;gap:16px;height:64px;max-width:1600px;margin:0 auto;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:32px;height:32px;background:#E50914;border-radius:4px;display:flex;align-items:center;justify-content:center;">
                    <span style="color:#fff;font-size:16px;font-weight:900;">▶</span>
                </div>
                <span style="font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px;">My<span style="color:#E50914">Shelf</span></span>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button class="mode-btn active-jav" id="btn-jav" onclick="switchMode('jav')">JAV</button>
                <button class="mode-btn" id="btn-irl" onclick="switchMode('irl')">IRL</button>
            </div>

            <!-- Sort (both modes) -->
            <div id="sort-wrap">
                <select id="sort-select" class="jav-sort">
                    <option value="newest">↓ Newest</option>
                    <option value="oldest">↑ Oldest</option>
                </select>
            </div>

            <!-- Date fetch progress -->
            <div id="date-fetch-status">
                <div class="spinner"></div>
                <span id="date-fetch-text">Fetching metadata…</span>
            </div>

            <div id="stats" style="color:#666;font-size:13px;">Loading…</div>
            <div style="margin-left:auto;" class="search-wrap">
                <span class="search-icon">⌕</span>
                <input id="search" placeholder="Search…" autocomplete="off">
                <button class="search-clear" id="search-clear" title="Clear">×</button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main style="max-width:1600px;margin:0 auto;padding:32px clamp(16px,5vw,56px) 64px;">
        <div style="margin-bottom:28px;display:flex;align-items:center;gap:12px;">
            <div id="section-bar" style="width:4px;height:24px;background:#E50914;border-radius:2px;transition:background 0.25s;"></div>
            <h2 id="section-title" style="font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.3px;">All Titles</h2>
        </div>
        <div id="error" style="display:none;text-align:center;color:#E50914;padding:48px;font-size:15px;"></div>
        <div id="grid" class="grid"></div>
        <div id="pagination" class="pagination"></div>
    </main>
</div>

<button id="back-to-top" title="Back to top">↑</button>

<script>
// ── Config ────────────────────────────────────────────────
const JAV_M3U8_URL      = "https://raw.githubusercontent.com/Sarker5523/My-Playlists/refs/heads/main/jav.m3u8";
const JAV_META_URL      = "metadata.json";
const IRL_META_URL      = "irl-metadata.json";
const TPDB_TOKEN        = "Aor5JIDSkxOhmXmNAOYP5Gnr73u7u3UPJZYaevBT2558d467";
const ITEMS_PER_PAGE    = 24;
const TPDB_CONCURRENCY  = 8;
const JAV_CONCURRENCY   = 6;

// CORS proxies to try in order for scraping
const CORS_PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://cors-anywhere.herokuapp.com/${url}`,
];

let mode        = 'jav';
let allEntries  = [];
let fullList    = [];
let masterList  = [];
let currentPage = 1;
let sortOrder   = 'newest';

const tpdbCache  = {};
const javMetaCache = {}; // code → enriched metadata

// ── URL state ─────────────────────────────────────────────
function getUrlParams() {
    const p = new URLSearchParams(window.location.search);
    return { page: parseInt(p.get('page')) || 1, q: p.get('q') || '', mode: p.get('mode') || 'jav', sort: p.get('sort') || 'newest' };
}
function pushUrlState(page, q, m, sort) {
    const url = new URL(window.location);
    url.searchParams.set('page', page);
    url.searchParams.set('mode', m || mode);
    url.searchParams.set('sort', sort || sortOrder);
    if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
    window.history.pushState({}, '', url);
}

// ── Mode switch ───────────────────────────────────────────
function switchMode(m) {
    if (mode === m) return;
    mode = m;
    updateModeUI();
    loadMode();
}

function updateModeUI() {
    const isIrl = mode === 'irl';
    document.getElementById('btn-jav').className = 'mode-btn' + (mode === 'jav' ? ' active-jav' : '');
    document.getElementById('btn-irl').className = 'mode-btn' + (isIrl ? ' active-irl' : '');
    document.getElementById('section-bar').style.background = isIrl ? '#7c3aed' : '#E50914';
    document.getElementById('section-title').textContent = isIrl ? 'IRL Titles' : 'All Titles';
    document.getElementById('search').className = isIrl ? 'irl-focus' : '';
    document.getElementById('sort-wrap').style.display = 'block';
    const sortSel = document.getElementById('sort-select');
    if (isIrl) { sortSel.classList.remove('jav-sort'); } else { sortSel.classList.add('jav-sort'); }
    const btt = document.getElementById('back-to-top');
    if (isIrl) btt.classList.add('irl'); else btt.classList.remove('irl');
    // date fetch spinner color
    const dfs = document.getElementById('date-fetch-status');
    if (isIrl) dfs.classList.add('irl-fetch'); else dfs.classList.remove('irl-fetch');
}

// ── Sort ──────────────────────────────────────────────────
function applySort() {
    const sorted = [...masterList].sort((a, b) => {
        const da = a.date || '0000-00-00';
        const db = b.date || '0000-00-00';
        return da < db ? 1 : da > db ? -1 : 0;
    });
    fullList = sortOrder === 'oldest' ? sorted.reverse() : sorted;
}

document.getElementById('sort-select').addEventListener('change', e => {
    sortOrder = e.target.value;
    applySort();
    applySearch(document.getElementById('search').value, 1);
});

// ── DMM cover helpers (JAV) ───────────────────────────────
function getDmmCid(code) {
    const parts = code.split('-');
    if (parts.length !== 2) return null;
    return parts[0].toLowerCase() + parts[1].padStart(5, '0');
}

function getDmmUrls(code) {
    const parts = code.split('-');
    const urls = [];
    if (parts.length === 2) {
        const prefix = parts[0].toLowerCase();
        const num = parts[1].padStart(5, '0');
        urls.push(`https://pics.dmm.co.jp/digital/video/${prefix}${num}/${prefix}${num}pl.jpg`);
        urls.push(`https://pics.dmm.co.jp/mono/movie/adult/${prefix}${num}/${prefix}${num}pl.jpg`);
    }
    return [...new Set(urls)];
}

window.handleImgError = function(img, code) {
    let tried = parseInt(img.dataset.tried || 0);
    const urls = img.dataset.dmm ? img.dataset.dmm.split('|') : [];
    if (urls[tried + 1]) {
        img.dataset.tried = tried + 1;
        img.src = urls[tried + 1];
    } else {
        img.onerror = null;
        img.style.display = 'none';
        const fb = document.createElement('div');
        fb.className = 'fallback';
        fb.innerHTML = `<div style="font-size:13px;font-weight:800;letter-spacing:2px;color:#E50914;text-align:center;padding:0 12px;">${code}</div>`;
        img.parentElement.appendChild(fb);
    }
};

// ── CORS proxy fetch ──────────────────────────────────────
async function proxiedFetch(url, asText = true) {
    for (const makeProxy of CORS_PROXIES) {
        try {
            const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
            if (!res.ok) continue;
            return asText ? await res.text() : await res.json();
        } catch { continue; }
    }
    return null;
}

// ── JAV metadata enrichment chain ────────────────────────
// Returns { title, cover, performers, date, studio, duration, source }
// source: 'r18' | 'dmm' | 'javlib' | 'local'

async function fetchR18Meta(code) {
    try {
        // R18.dev public JSON API — no CORS issues
        const url = `https://api.r18.dev/v2/videos?keyword=${encodeURIComponent(code)}&per_page=3&page=1`;
        const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) return null;
        const json = await res.json();
        const videos = json.videos || json.result || [];
        // Find best match: exact code match preferred
        const hit = videos.find(v => {
            const id = (v.id || v.content_id || '').toUpperCase().replace('_', '-');
            return id === code.toUpperCase();
        }) || videos[0];
        if (!hit) return null;

        const performers = (hit.actresses || hit.cast || []).map(a => a.name || a.name_romaji || a).filter(Boolean);
        const cover = hit.images?.large?.['1'] || hit.images?.medium?.['1'] || hit.jacket_full_url || hit.jacket_thumb_url || '';
        const date = (hit.release_date || hit.date || '').slice(0, 10);
        const studio = hit.maker?.name || hit.label?.name || '';
        const durationMin = hit.runtime ? Math.round(hit.runtime) : null;

        return { title: hit.title || null, cover, performers, date, studio, duration: durationMin ? durationMin * 60 : null, source: 'r18' };
    } catch { return null; }
}

async function fetchDmmMeta(code) {
    try {
        const cid = getDmmCid(code);
        if (!cid) return null;
        const pageUrl = `https://www.dmm.co.jp/digital/videoa/-/detail/=/cid=${cid}/`;
        const html = await proxiedFetch(pageUrl, true);
        if (!html) return null;

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Title
        const titleEl = doc.querySelector('h1#title') || doc.querySelector('.productTitle__txt') || doc.querySelector('h1.item-ttl');
        const title = titleEl ? titleEl.textContent.trim() : null;

        // Cover
        const coverEl = doc.querySelector('#package-src') || doc.querySelector('.productPreview__item img') || doc.querySelector('img[id*="package"]');
        const cover = coverEl ? (coverEl.getAttribute('src') || '') : '';

        // Performers — DMM lists them in performer links
        const perfLinks = [...doc.querySelectorAll('a[href*="/actress/"]')];
        const performers = [...new Set(perfLinks.map(a => a.textContent.trim()).filter(Boolean))];

        // Date
        let date = '';
        const allTds = [...doc.querySelectorAll('td, li, span')];
        for (const el of allTds) {
            const text = el.textContent.trim();
            if (/^\d{4}\/\d{2}\/\d{2}$/.test(text)) {
                date = text.replace(/\//g, '-');
                break;
            }
        }

        // Studio
        const studioLink = doc.querySelector('a[href*="/maker/"]');
        const studio = studioLink ? studioLink.textContent.trim() : '';

        if (!performers.length && !date) return null; // not enough data
        return { title, cover: cover || '', performers, date, studio, duration: null, source: 'dmm' };
    } catch { return null; }
}

async function fetchJavLibMeta(code) {
    try {
        // JavLibrary search by code
        const searchUrl = `https://www.javlibrary.com/en/vl_searchbyid.php?keyword=${encodeURIComponent(code)}`;
        const html = await proxiedFetch(searchUrl, true);
        if (!html) return null;

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // If redirected to a video page directly
        let videoDoc = doc;

        // If search results page, pick first result
        const firstResult = doc.querySelector('.videos .video a');
        if (firstResult) {
            const href = firstResult.getAttribute('href');
            const videoUrl = `https://www.javlibrary.com/en/${href}`;
            const vHtml = await proxiedFetch(videoUrl, true);
            if (!vHtml) return null;
            videoDoc = parser.parseFromString(vHtml, 'text/html');
        }

        // Title
        const titleEl = videoDoc.querySelector('h3#video_title a') || videoDoc.querySelector('.post-title');
        const title = titleEl ? titleEl.textContent.trim() : null;

        // Date
        const dateEl = videoDoc.querySelector('#video_date .text');
        const date = dateEl ? dateEl.textContent.trim() : '';

        // Performers
        const castEls = [...videoDoc.querySelectorAll('#video_cast .cast .star')];
        const performers = castEls.map(el => el.textContent.trim()).filter(Boolean);

        // Studio / maker
        const makerEl = videoDoc.querySelector('#video_maker .text a');
        const studio = makerEl ? makerEl.textContent.trim() : '';

        if (!performers.length && !date) return null;
        return { title, cover: '', performers, date, studio, duration: null, source: 'javlib' };
    } catch { return null; }
}

async function enrichJavEntry(entry, localMeta) {
    if (javMetaCache[entry.code]) return javMetaCache[entry.code];

    // Layer 1: R18.dev
    let meta = await fetchR18Meta(entry.code);

    // Layer 2: DMM scrape
    if (!meta || (!meta.performers?.length && !meta.date)) {
        const dmmMeta = await fetchDmmMeta(entry.code);
        if (dmmMeta) {
            meta = meta ? { ...meta, ...Object.fromEntries(Object.entries(dmmMeta).filter(([,v]) => v)) } : dmmMeta;
        }
    }

    // Layer 3: JavLibrary scrape
    if (!meta || (!meta.performers?.length && !meta.date)) {
        const javMeta = await fetchJavLibMeta(entry.code);
        if (javMeta) {
            meta = meta ? { ...meta, ...Object.fromEntries(Object.entries(javMeta).filter(([,v]) => v)) } : javMeta;
        }
    }

    // Layer 4: local metadata.json fallback
    if (!meta) {
        meta = {
            title: localMeta?.title || entry.code,
            cover: localMeta?.cover || '',
            performers: [],
            date: '',
            studio: '',
            duration: null,
            source: 'local'
        };
    } else {
        // Fill missing fields from local metadata
        if (!meta.title && localMeta?.title) meta.title = localMeta.title;
        if (!meta.cover && localMeta?.cover) meta.cover = localMeta.cover;
    }

    javMetaCache[entry.code] = meta;
    return meta;
}

// ── Prefetch all JAV metadata upfront ────────────────────
async function fetchAllJavMeta(entries, metaMap) {
    const statusEl = document.getElementById('date-fetch-status');
    const textEl   = document.getElementById('date-fetch-text');
    statusEl.style.display = 'flex';

    let completed = 0;
    const total = entries.length;

    for (let i = 0; i < entries.length; i += JAV_CONCURRENCY) {
        const batch = entries.slice(i, i + JAV_CONCURRENCY);
        await Promise.all(batch.map(async entry => {
            const localMeta = metaMap.get(entry.code.toUpperCase());
            const meta = await enrichJavEntry(entry, localMeta);
            entry.date        = meta.date || '';
            entry.performers  = meta.performers || [];
            entry.title       = meta.title || entry.code;
            entry.cover       = meta.cover || entry.cover || '';
            entry.studio      = meta.studio || '';
            entry.duration    = meta.duration || null;
            entry.metaSource  = meta.source || 'local';
            completed++;
            textEl.textContent = `Fetching metadata… ${completed}/${total}`;
        }));
    }

    statusEl.style.display = 'none';
}

// ── TPDB fetch (IRL only) ─────────────────────────────────
async function fetchTpdb(parentId) {
    if (tpdbCache[parentId]) return tpdbCache[parentId];
    try {
        const res = await fetch(`https://api.theporndb.net/scenes/${parentId}?add_to_collection=false`, {
            headers: { 'accept': 'application/json', 'Authorization': `Bearer ${TPDB_TOKEN}` }
        });
        if (!res.ok) return null;
        const json = await res.json();
        const d = json.data || json;
        tpdbCache[parentId] = d;
        return d;
    } catch { return null; }
}

async function fetchAllIrlDates(entries) {
    const statusEl = document.getElementById('date-fetch-status');
    const textEl   = document.getElementById('date-fetch-text');
    statusEl.style.display = 'flex';

    let completed = 0;
    const total = entries.length;

    for (let i = 0; i < entries.length; i += TPDB_CONCURRENCY) {
        const batch = entries.slice(i, i + TPDB_CONCURRENCY);
        await Promise.all(batch.map(async entry => {
            const data = await fetchTpdb(entry.parentId);
            if (data) entry.date = data.date || data.release_date || null;
            completed++;
            textEl.textContent = `Fetching dates… ${completed}/${total}`;
        }));
    }

    statusEl.style.display = 'none';
}

// ── Card builders ─────────────────────────────────────────
function createJavCard(entry) {
    const card = document.createElement('div');
    card.className = 'card jav-card';
    const dmmUrls = getDmmUrls(entry.code);
    const cover = entry.cover || dmmUrls[0] || '';

    card.innerHTML = `
        <div class="poster-container">
            <img src="${cover}" class="poster-img" loading="lazy"
                data-dmm="${dmmUrls.join('|')}" data-tried="0"
                onerror="handleImgError(this,'${entry.code.replace(/'/g,"\\'")}')"
                alt="${entry.code}">
            <div class="badge badge-jav">${entry.code}</div>
            ${entry.metaSource ? `<div class="source-tag source-${entry.metaSource}">${entry.metaSource.toUpperCase()}</div>` : ''}
        </div>
        <div class="card-body">
            <div class="card-title">${entry.title || entry.code}</div>
            <div class="card-meta" id="jav-meta-${entry.code.replace(/[^a-z0-9]/gi,'_')}"></div>
            <button class="copy-btn"><span style="font-size:12px;">⎘</span> Copy URL</button>
        </div>`;

    // Populate meta
    const metaEl = card.querySelector('.card-meta');
    const addMeta = (label, value, extraClass = '') => {
        if (!value) return;
        const row = document.createElement('div');
        row.className = 'meta-row' + (extraClass ? ' ' + extraClass : '');
        row.innerHTML = `<span class="meta-label">${label}</span>${value}`;
        metaEl.appendChild(row);
    };

    if (entry.performers?.length) {
        addMeta('Cast', entry.performers.slice(0, 6).join(', ') + (entry.performers.length > 6 ? ` +${entry.performers.length - 6}` : ''), 'meta-performers');
    }
    if (entry.studio) addMeta('Studio', entry.studio);
    if (entry.date)   addMeta('Date', entry.date.slice(0, 10));
    if (entry.duration) {
        const h = Math.floor(entry.duration / 3600), m = Math.floor((entry.duration % 3600) / 60);
        addMeta('Duration', h ? `${h}h ${m}m` : `${m}m`);
    }

    card.querySelector('.copy-btn').onclick = () => copyUrl(card.querySelector('.copy-btn'), entry.url, false);
    return card;
}

function createIrlCard(entry) {
    const card = document.createElement('div');
    card.className = 'card irl-card';

    card.innerHTML = `
        <div class="poster-container">
            <div class="fallback" id="fb-${entry.parentId}">
                <div class="spinner"></div>
            </div>
        </div>
        <div class="card-body">
            <div class="card-title" id="title-${entry.parentId}">${entry.name}</div>
            <div class="card-meta" id="meta-${entry.parentId}">
                <div class="irl-loading"><div class="spinner"></div><span>Fetching details…</span></div>
            </div>
            <button class="copy-btn irl"><span style="font-size:12px;">⎘</span> Copy URL</button>
        </div>`;

    card.querySelector('.copy-btn').onclick = () => copyUrl(card.querySelector('.copy-btn'), entry.url, true);

    fetchTpdb(entry.parentId).then(data => {
        if (!data) {
            const metaEl = document.getElementById(`meta-${entry.parentId}`);
            if (metaEl) metaEl.innerHTML = '';
            return;
        }

        const posterEl = card.querySelector('.poster-container');
        const fb = document.getElementById(`fb-${entry.parentId}`);
        const poster = data.background?.medium || data.posters?.[0]?.url || data.image || data.poster || '';
        if (poster) {
            const img = document.createElement('img');
            img.className = 'poster-img';
            img.loading = 'lazy';
            img.src = poster;
            img.alt = data.title || entry.name;
            img.onerror = () => {
                img.remove();
                if (fb) fb.innerHTML = `<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#7c3aed;text-align:center;padding:0 12px;">${entry.name}</div>`;
            };
            if (fb) { posterEl.insertBefore(img, fb); fb.remove(); }
        } else {
            if (fb) fb.innerHTML = `<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#7c3aed;text-align:center;padding:0 12px;">${entry.name}</div>`;
        }

        const site = data.site?.name || data.studio?.name || '';
        if (site) {
            const badge = document.createElement('div');
            badge.className = 'badge badge-irl';
            badge.textContent = site;
            posterEl.appendChild(badge);
        }

        const titleEl = document.getElementById(`title-${entry.parentId}`);
        if (titleEl && data.title) titleEl.textContent = data.title;

        const metaEl = document.getElementById(`meta-${entry.parentId}`);
        if (!metaEl) return;
        metaEl.innerHTML = '';

        const addMeta = (label, value) => {
            if (!value) return;
            const row = document.createElement('div');
            row.className = 'meta-row' + (label === 'Cast' ? ' meta-performers' : '');
            row.innerHTML = `<span class="meta-label">${label}</span>${value}`;
            metaEl.appendChild(row);
        };

        const performers = (data.performers || []).map(p => p.name || p).filter(Boolean);
        addMeta('Cast', performers.slice(0, 6).join(', ') + (performers.length > 6 ? ` +${performers.length - 6}` : ''));
        addMeta('Studio', data.site?.name || data.studio?.name || '');
        const date = data.date || data.release_date || '';
        if (date) addMeta('Date', date.slice(0, 10));
        const dur = data.duration;
        if (dur) {
            const h = Math.floor(dur / 3600), m = Math.floor((dur % 3600) / 60);
            addMeta('Duration', h ? `${h}h ${m}m` : `${m}m`);
        }
        const tags = (data.tags || data.categories || []).map(t => t.name || t).filter(Boolean);
        if (tags.length) addMeta('Tags', tags.slice(0, 5).join(', '));
    });

    return card;
}

function copyUrl(btn, url, isIrl) {
    navigator.clipboard.writeText(url).then(() => {
        const orig = btn.innerHTML;
        btn.textContent = '✓ Copied!';
        btn.classList.add('success');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('success'); }, 1800);
    });
}

// ── Skeletons ─────────────────────────────────────────────
function showSkeletons(count) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < count; i++) {
        grid.innerHTML += `<div class="skeleton">
            <div class="skeleton-img"></div>
            <div class="skeleton-body">
                <div class="skeleton-line"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>`;
    }
}

// ── Pagination ────────────────────────────────────────────
function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (totalPages <= 1) return;

    const addBtn = (label, page, disabled, active) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        if (disabled) btn.disabled = true;
        if (active) btn.classList.add(mode === 'irl' ? 'active-irl' : 'active-jav');
        if (!disabled) btn.onclick = () => renderPage(page);
        pg.appendChild(btn);
    };
    const addEllipsis = () => {
        const s = document.createElement('span');
        s.className = 'ellipsis'; s.textContent = '…'; pg.appendChild(s);
    };

    addBtn('← Prev', currentPage - 1, currentPage === 1, false);
    const pages = new Set([1, totalPages]);
    for (let i = Math.max(2, currentPage - 2); i <= Math.min(totalPages - 1, currentPage + 2); i++) pages.add(i);
    const sorted = [...pages].sort((a, b) => a - b);
    let prev = 0;
    for (const p of sorted) {
        if (p - prev > 1) addEllipsis();
        addBtn(p, p, false, p === currentPage);
        prev = p;
    }
    addBtn('Next →', currentPage + 1, currentPage === totalPages, false);
}

// ── Render page ───────────────────────────────────────────
function renderPage(page, skipPush) {
    currentPage = page;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const start = (page - 1) * ITEMS_PER_PAGE;
    const pageItems = allEntries.slice(start, start + ITEMS_PER_PAGE);
    pageItems.forEach(entry => {
        grid.appendChild(mode === 'jav' ? createJavCard(entry) : createIrlCard(entry));
    });

    renderPagination(Math.ceil(allEntries.length / ITEMS_PER_PAGE));
    if (!skipPush) {
        const q = document.getElementById('search').value.trim();
        pushUrlState(page, q, mode, sortOrder);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Search ────────────────────────────────────────────────
function applySearch(term, page) {
    const t = term.toLowerCase().trim();
    allEntries = t ? fullList.filter(e => {
        const performers = (e.performers || []).join(' ').toLowerCase();
        return (e.code || e.name || '').toLowerCase().includes(t) ||
               (e.title || '').toLowerCase().includes(t) ||
               (e.studio || '').toLowerCase().includes(t) ||
               performers.includes(t);
    }) : [...fullList];
    document.getElementById('stats').textContent =
        t ? `${allEntries.length} of ${fullList.length} titles` : `${fullList.length} titles`;
    renderPage(page || 1);
}

// ── Load JAV ──────────────────────────────────────────────
async function loadJav() {
    showSkeletons(ITEMS_PER_PAGE);
    try {
        const [metadata, m3uText] = await Promise.all([
            fetch(JAV_META_URL).then(r => r.ok ? r.json() : []).catch(() => []),
            fetch(JAV_M3U8_URL).then(r => r.text())
        ]);
        const lines = m3uText.split('\n').map(l => l.trim()).filter(Boolean);
        const entries = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF')) {
                const match = lines[i].match(/,(.+)$/);
                const code = match ? match[1].trim() : 'UNKNOWN';
                const url = lines[i+1] && !lines[i+1].startsWith('#') ? lines[i+1].trim() : null;
                if (url) entries.push({ code, url, title: code, cover: null, performers: [], date: '', studio: '', duration: null, metaSource: 'local' });
            }
        }
        entries.reverse(); // newest last-added first

        const metaMap = new Map(metadata.map(m => [m.code?.toUpperCase(), m]));

        // Pre-populate from local metadata.json so we have something while fetching
        entries.forEach(entry => {
            const local = metaMap.get(entry.code.toUpperCase());
            if (local) {
                entry.title = local.title || entry.code;
                entry.cover = local.cover || '';
            }
        });

        document.getElementById('stats').textContent = `${entries.length} titles`;

        // Fetch all metadata upfront (R18 → DMM → JavLib → local fallback)
        await fetchAllJavMeta(entries, metaMap);

        masterList = entries;
        applySort();

        const { page, q } = getUrlParams();
        document.getElementById('search').value = q;
        document.getElementById('search-clear').style.display = q ? 'block' : 'none';
        applySearch(q, page);
    } catch (e) {
        showError('Failed to load JAV data.');
        console.error(e);
    }
}

// ── Load IRL ──────────────────────────────────────────────
async function loadIrl() {
    showSkeletons(ITEMS_PER_PAGE);
    try {
        const irlMeta = await fetch(IRL_META_URL).then(r => r.ok ? r.json() : []).catch(() => []);
        const rawList = irlMeta.map(entry => ({
            name: entry.Name || 'Unknown',
            parentId: entry.ParentId,
            url: entry.Url,
            title: entry.Name || 'Unknown',
            date: null
        }));

        document.getElementById('stats').textContent = `${rawList.length} titles`;
        await fetchAllIrlDates(rawList);

        masterList = rawList;
        applySort();
        const { page, q } = getUrlParams();
        document.getElementById('search').value = q;
        document.getElementById('search-clear').style.display = q ? 'block' : 'none';
        applySearch(q, page);
    } catch {
        showError('Failed to load IRL data.');
    }
}

function loadMode() {
    document.getElementById('stats').textContent = 'Loading…';
    document.getElementById('error').style.display = 'none';
    document.getElementById('date-fetch-status').style.display = 'none';
    masterList = []; fullList = []; allEntries = []; currentPage = 1;
    sortOrder = 'newest';
    document.getElementById('sort-select').value = 'newest';
    document.getElementById('search').value = '';
    document.getElementById('search-clear').style.display = 'none';
    if (mode === 'jav') loadJav(); else loadIrl();
}

function showError(msg) {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = msg;
}

// ── Back to top ───────────────────────────────────────────
const backBtn = document.getElementById('back-to-top');
window.addEventListener('scroll', () => backBtn.classList.toggle('visible', window.scrollY > 400));
backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// ── Search wiring ─────────────────────────────────────────
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('search-clear');
searchEl.addEventListener('input', e => {
    const val = e.target.value;
    clearBtn.style.display = val ? 'block' : 'none';
    applySearch(val, 1);
});
clearBtn.onclick = () => {
    searchEl.value = ''; clearBtn.style.display = 'none'; applySearch('', 1);
};

// ── Browser back/forward ──────────────────────────────────
window.addEventListener('popstate', () => {
    const { page, q, mode: m, sort } = getUrlParams();
    if (m !== mode) { mode = m; updateModeUI(); loadMode(); return; }
    sortOrder = sort || 'newest';
    document.getElementById('sort-select').value = sortOrder;
    applySort();
    searchEl.value = q;
    clearBtn.style.display = q ? 'block' : 'none';
    applySearch(q, page);
});

// ── Init ──────────────────────────────────────────────────
(function init() {
    const { mode: m, sort } = getUrlParams();
    mode = (m === 'irl') ? 'irl' : 'jav';
    sortOrder = sort || 'newest';
    document.getElementById('sort-select').value = sortOrder;
    updateModeUI();
    loadMode();
})();
</script>
