<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filegarden Playlist - Video.js Total Skin</title>

    <!-- Video.js Core -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">

    <!-- Video.js Total / Tube Skin (Dark Modern Style) -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/0xPrateek/videojs-tube-skin@master/dist/videojs-tube-skin.min.css">

    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #141414;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            border-bottom: 4px solid #e50914;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-area {
            flex: 2;
            background: #000;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .now-playing {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 17px;
            max-width: 65%;
            z-index: 25;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 5px solid #e50914;
        }

        .input-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #e50914;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            min-width: 80px;
            text-align: center;
            z-index: 30;
            border: 2px solid #e50914;
            display: none;
        }

        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 16px;
            border: 2px solid #e50914;
            display: none;
            z-index: 20;
        }

        .playlist-area {
            flex: 1;
            background: #1a1a1a;
            overflow-y: auto;
            padding: 10px;
            scroll-behavior: smooth;
        }

        .item {
            padding: 12px;
            margin: 6px 0;
            background: #222;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .item.active {
            background: #383838;
            border-left: 4px solid #e50914;
        }

        .controls {
            padding: 12px;
            background: #141414;
            text-align: center;
        }

        button {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        .hint {
            padding: 10px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            background: #141414;
        }
    </style>

    <!-- Video.js JS -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- HLS.js fallback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
    <header>Filegarden Playlist • Video.js Total Skin</header>

    <div class="main">
        <div class="player-area">
            <video id="video" class="video-js vjs-tube-skin" controls playsinline preload="auto"></video>

            <div class="now-playing" id="nowPlaying">
                <span style="color:#e50914;">▶</span>
                <span id="currentTitle"></span>
            </div>

            <div class="input-display" id="inputDisplay">—</div>
            <div class="status" id="status">Loading playlist...</div>
        </div>

        <div class="playlist-area" id="playlist"></div>
    </div>

    <div class="hint">
        Press numbers (e.g. 05 or 12) • Press 0 for Fullscreen • Arrow keys for navigation
    </div>

    <div class="controls">
        <button onclick="toggleSource()" style="background:#444;">🔄 Switch Source</button>
        <button onclick="prevVideo()">◀ Previous</button>
        <button onclick="playCurrent()">▶ Play / Retry</button>
        <button onclick="nextVideo()">Next ▶</button>
    </div>

    <script>
        // Sources
        const SOURCE_1 = "https://raw.githubusercontent.com/Sarker5523/My-Playlists/refs/heads/main/IRL%20Videos.m3u8";
        const SOURCE_2 = "https://raw.githubusercontent.com/Sarker5523/My-Playlists/refs/heads/main/tv_series.m3u8";

        let currentSource = SOURCE_1;
        let playlist = [];
        let currentIndex = 0;
        let numberBuffer = '';
        let player = null;
        let hls = null;

        const statusEl = document.getElementById('status');
        const nowPlayingEl = document.getElementById('nowPlaying');
        const currentTitleEl = document.getElementById('currentTitle');
        const inputDisplay = document.getElementById('inputDisplay');
        const playlistContainer = document.getElementById('playlist');

        function initVideoPlayer() {
            player = videojs('video', {
                fluid: true,
                responsive: true,
                controls: true,
                autoplay: false,
                preload: 'auto',
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                html5: {
                    hls: { overrideNative: true }
                }
            });

            player.on('ended', nextVideo);
        }

        function loadPlaylist() {
            statusEl.style.display = 'block';
            statusEl.textContent = 'Fetching playlist...';

            fetch(currentSource)
                .then(res => res.text())
                .then(text => parseM3U8(text))
                .catch(() => {
                    statusEl.textContent = 'Failed to load playlist. Check internet.';
                });
        }

        function toggleSource() {
            currentSource = (currentSource === SOURCE_1) ? SOURCE_2 : SOURCE_1;
            currentIndex = 0;
            loadPlaylist();

            const sourceName = (currentSource === SOURCE_1) ? "IRL Videos" : "TV Series";
            statusEl.textContent = `Switched to: ${sourceName}`;
            statusEl.style.display = 'block';
            setTimeout(() => statusEl.style.display = 'none', 2000);
        }

        function parseM3U8(text) {
            const lines = text.split('\n');
            playlist = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const title = lines[i].split(',').slice(1).join(',').trim();
                    const url = lines[i + 1] ? lines[i + 1].trim() : '';
                    if (url && !url.startsWith('#')) {
                        playlist.push({ title: title || `Video ${playlist.length + 1}`, url: url });
                    }
                }
            }

            if (playlist.length === 0) {
                statusEl.textContent = 'No videos found.';
                return;
            }

            statusEl.style.display = 'none';
            renderPlaylist();
            loadVideo(0);
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `item ${i === currentIndex ? 'active' : ''}`;
                div.textContent = `${i + 1}. ${item.title}`;
                div.onclick = () => loadVideo(i);
                playlistContainer.appendChild(div);
            });
        }

        function scrollToActive() {
            const active = playlistContainer.querySelector('.item.active');
            if (active) active.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        function loadVideo(index) {
            if (index < 0 || index >= playlist.length) return;

            currentIndex = index;
            const item = playlist[index];

            renderPlaylist();
            scrollToActive();

            currentTitleEl.textContent = item.title;
            nowPlayingEl.style.display = 'flex';
            setTimeout(() => nowPlayingEl.style.display = 'none', 5000);

            statusEl.style.display = 'block';
            statusEl.textContent = `Loading ${index + 1}: ${item.title}`;

            if (hls) {
                hls.destroy();
                hls = null;
            }

            const isHLS = item.url.toLowerCase().endsWith('.m3u8');

            player.src({
                src: item.url,
                type: isHLS ? 'application/x-mpegURL' : 'video/mp4'
            });

            player.load();
            player.ready(() => {
                player.play().catch(() => { });
            });
        }

        function playCurrent() {
            if (player) player.play().catch(() => { });
        }

        function nextVideo() {
            let next = currentIndex + 1;
            if (next >= playlist.length) next = 0;
            loadVideo(next);
        }

        function prevVideo() {
            let prev = currentIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            loadVideo(prev);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (/^\d$/.test(key)) {
                if (key === '0' && numberBuffer === '') {
                    if (player) player.requestFullscreen();
                    return;
                }
                numberBuffer += key;
                inputDisplay.textContent = numberBuffer;
                inputDisplay.style.display = 'block';
                clearTimeout(window.numberTimeout);
                window.numberTimeout = setTimeout(processNumberInput, 1200);
                return;
            }

            if (key === "ArrowRight") nextVideo();
            if (key === "ArrowLeft") prevVideo();
            if (key === " ") {
                e.preventDefault();
                if (player) player.paused() ? playCurrent() : player.pause();
            }
        });

        function processNumberInput() {
            if (numberBuffer === '') return;
            const num = parseInt(numberBuffer);
            numberBuffer = '';
            inputDisplay.style.display = 'none';

            if (num >= 1 && num <= playlist.length) {
                loadVideo(num - 1);
            } else {
                statusEl.textContent = `Invalid number: ${num}`;
                setTimeout(() => statusEl.style.display = 'none', 2000);
            }
        }

        // Start
        window.onload = () => {
            initVideoPlayer();
            loadPlaylist();
        };
    </script>
</body>

</html>
