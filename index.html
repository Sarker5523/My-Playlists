<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filegarden Test - First 5 with Number Keys</title>
    <style>
        body { background:#0f0f0f; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        header { background:#141414; padding:15px; text-align:center; font-size:22px; border-bottom:4px solid #e50914; }
        .main { display:flex; flex:1; overflow:hidden; }
        .player-area { flex:2; background:#000; position:relative; }
        #video { width:100%; height:100%; background:#000; }
        .now-playing { position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.85); color:white; padding:12px 20px; border-radius:8px; font-size:17px; max-width:65%; z-index:25; display:none; align-items:center; gap:10px; border-left:5px solid #e50914; }
        .input-display { position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.9); color:#e50914; padding:10px 18px; border-radius:8px; font-size:28px; font-weight:bold; font-family:monospace; min-width:80px; text-align:center; z-index:30; border:2px solid #e50914; display:none; }
        .status { position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.9); padding:10px 15px; border-radius:6px; font-size:16px; border:2px solid #e50914; display:none; }
        .playlist-area { flex:1; background:#1a1a1a; overflow-y:auto; padding:10px; }
        .item { padding:12px; margin:6px 0; background:#222; cursor:pointer; border-left:4px solid transparent; }
        .item.active { background:#383838; border-left:4px solid #e50914; }
        .controls { padding:12px; background:#141414; text-align:center; }
        button { background:#e50914; color:white; border:none; padding:10px 20px; margin:5px; border-radius:4px; font-size:15px; cursor:pointer; }
        .hint { padding:10px; text-align:center; font-size:13px; color:#aaa; background:#141414; }
    </style>
</head>
<body>

    <header>Test Playlist - First 5 with Number Keys</header>

    <div class="main">
        <div class="player-area">
            <video id="video" controls playsinline></video>
            <div class="now-playing" id="nowPlaying"><span style="color:#e50914;">▶</span> <span id="currentTitle"></span></div>
            <div class="input-display" id="inputDisplay">—</div>
            <div class="status" id="status"></div>
        </div>
        <div class="playlist-area" id="playlist"></div>
    </div>

    <div class="hint">Press numbers (e.g. 03) to jump • Press 0 first for Fullscreen • Use Play button if needed</div>

    <div class="controls">
        <button onclick="prevVideo()">◀ Previous</button>
        <button onclick="playCurrent()">▶ Play / Retry</button>
        <button onclick="nextVideo()">Next ▶</button>
    </div>

    <script>
        let playlist = [
            { title: "Meet The Sari-Sisters: Indian Twins Share Their First Cock", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Meet%20the%20Sari-Sisters-%20Indian%20Twins%20Share%20Their%20First%20Cock%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "Besties And Wives", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Besties%20and%20Wives%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "Concept: Demure Wives #2 (Double Vag Penetration!)", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Concept-%20Demure%20Wives%20%232%20(Double%20Vag%20Penetration!)%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "You Catfished Your Stepmom?! Fuck Her Ass To Get Rid Of The Tension", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/You%20Catfished%20Your%20Stepmom.!%20Fuck%20Her%20Ass%20to%20Get%20Rid%20Of%20the%20Tension%20(Alexis%20James'%20Debut)%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "I Finally Fucked My Bully Stepsister In The Ass", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/I%20Finally%20Fucked%20My%20Bully%20Stepsister%20in%20The%20Ass%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" }
        ];

        let currentIndex = 0;
        let numberBuffer = '';

        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const nowPlayingEl = document.getElementById('nowPlaying');
        const currentTitleEl = document.getElementById('currentTitle');
        const playlistContainer = document.getElementById('playlist');
        const inputDisplay = document.getElementById('inputDisplay');

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `item ${i === currentIndex ? 'active' : ''}`;
                div.textContent = (i + 1) + '. ' + item.title;
                div.onclick = () => loadVideo(i);
                playlistContainer.appendChild(div);
            });
        }

        function loadVideo(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const item = playlist[index];

            renderPlaylist();

            currentTitleEl.textContent = item.title;
            nowPlayingEl.style.display = 'flex';
            setTimeout(() => nowPlayingEl.style.display = 'none', 4000);

            statusEl.style.display = 'block';
            statusEl.textContent = `Loading ${index + 1}: ${item.title}`;

            video.src = item.url;
            video.load();
        }

        function playCurrent() {
            statusEl.textContent = "Playing...";
            video.play().catch(() => {
                statusEl.textContent = "Play failed - press Play/Retry again";
            });
        }

        function nextVideo() {
            let next = currentIndex + 1;
            if (next >= playlist.length) next = 0;
            loadVideo(next);
        }

        function prevVideo() {
            let prev = currentIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            loadVideo(prev);
        }

        // ====================== NUMBER KEY LOGIC ======================
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (/^\d$/.test(key)) {   // digit pressed
                if (key === '0' && numberBuffer === '') {
                    // First 0 = Fullscreen
                    if (video.requestFullscreen) video.requestFullscreen();
                    else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                    return;
                }

                numberBuffer += key;
                inputDisplay.textContent = numberBuffer;
                inputDisplay.style.display = 'block';

                clearTimeout(window.numberTimeout);
                window.numberTimeout = setTimeout(processNumberInput, 1200);
                return;
            }

            if (key === "ArrowRight") nextVideo();
            if (key === "ArrowLeft") prevVideo();
            if (key === " ") {
                e.preventDefault();
                video.paused ? playCurrent() : video.pause();
            }
        });

        function processNumberInput() {
            if (numberBuffer === '') return;

            const num = parseInt(numberBuffer);
            numberBuffer = '';
            inputDisplay.style.display = 'none';

            if (num >= 1 && num <= playlist.length) {
                loadVideo(num - 1);
            } else {
                statusEl.textContent = `Invalid number: ${num}`;
                setTimeout(() => { if (statusEl.textContent.includes('Invalid')) statusEl.style.display = 'none'; }, 2000);
            }
        }

        // Video events
        video.addEventListener('loadedmetadata', () => {
            statusEl.style.display = 'none';
            setTimeout(playCurrent, 600);
            nowPlayingEl.style.display = 'flex';
            setTimeout(() => nowPlayingEl.style.display = 'none', 4000);
        });

        video.addEventListener('error', () => {
            statusEl.style.display = 'block';
            statusEl.textContent = `Failed to load video. Press Play/Retry.`;
        });

        video.addEventListener('ended', nextVideo);

        // Start
        window.onload = () => {
            renderPlaylist();
            loadVideo(0);
        };
    </script>
</body>
</html>
