<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShelf - JAV Collection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0A0A0A; color: #e8e8e8; font-family: 'Inter', sans-serif; }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #E50914; }

        .header {
            padding: 0 clamp(16px, 5vw, 56px);
            background: linear-gradient(to bottom, #000 0%, transparent 100%);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #1a1a1a;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 24px;
            height: 64px;
            max-width: 1600px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px 14px;
        }

        .card {
            background: #141414;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: default;
            transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            position: relative;
        }

        .card:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 8px 32px rgba(229,9,20,0.28), 0 2px 8px rgba(0,0,0,0.5);
        }

        .poster-container {
            position: relative;
            padding-top: 140%;
            background: #0f0f0f;
            overflow: hidden;
        }

        .poster-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .fallback-poster {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(135deg, #1a0a0a, #1a1a2a);
        }

        .copy-btn {
            margin-top: 4px;
            padding: 7px 0;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .copy-btn:hover { background: #E50914; }
        .copy-btn.success { background: #1a6b1a; }

        .skeleton-poster {
            width: 100%;
            padding-top: 140%;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body>
    <div style="min-height: 100vh; background: #0A0A0A;">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                    <div style="width: 32px; height: 32px; background: #E50914; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                        <span style="color: #fff; font-size: 16px; font-weight: 900;">▶</span>
                    </div>
                    <span style="font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.5px;">
                        My<span style="color: #E50914">Shelf</span>
                    </span>
                </div>

                <div id="stats" style="color: #666; font-size: 13px; flex-shrink: 0;">Loading…</div>

                <div style="margin-left: auto; position: relative;">
                    <span style="position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #666; font-size: 14px;">⌕</span>
                    <input id="search" type="text" placeholder="Search by code…" 
                           style="background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; color: #e8e8e8; padding: 8px 14px 8px 32px; font-size: 13px; outline: none; width: 200px;">
                </div>
            </div>
        </header>

        <main style="max-width: 1600px; margin: 0 auto; padding: 32px clamp(16px, 5vw, 56px) 64px;">
            <div style="margin-bottom: 28px; display: flex; align-items: center; gap: 12px;">
                <div style="width: 4px; height: 24px; background: #E50914; border-radius: 2px;"></div>
                <h2 style="font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px;">All Titles</h2>
            </div>

            <div id="error" style="display: none; text-align: center; color: #E50914; padding: 48px; font-size: 15px;"></div>
            <div id="grid" class="grid"></div>
        </main>
    </div>

    <script>
        const PLAYLIST_URL = "https://raw.githubusercontent.com/Sarker5523/My-Playlists/refs/heads/main/jav.m3u8";

        function parseM3U8(text) {
            const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
            const entries = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith("#EXTINF")) {
                    const match = lines[i].match(/,(.+)$/);
                    const code = match ? match[1].trim() : "UNKNOWN";
                    const url = lines[i + 1] && !lines[i + 1].startsWith("#") ? lines[i + 1].trim() : null;
                    if (url) entries.push({ code, url });
                }
            }
            return entries;
        }

        function getDmmCoverUrl(code) {
            const lower = code.toLowerCase().replace("-", "");
            const parts = code.split("-");
            if (parts.length === 2) {
                const prefix = parts[0].toLowerCase();
                const num = parts[1].padStart(5, "0");
                const numShort = parts[1];
                return [
                    `https://pics.dmm.co.jp/mono/movie/adult/${lower}/${lower}pl.jpg`,
                    `https://pics.dmm.co.jp/mono/movie/adult/${prefix}${num}/${prefix}${num}pl.jpg`,
                    `https://pics.dmm.co.jp/mono/movie/adult/${prefix}${numShort}/${prefix}${numShort}pl.jpg`,
                ];
            }
            return [];
        }

        function createSkeleton() {
            const div = document.createElement('div');
            div.style.cssText = 'background:#1a1a1a;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;';
            div.innerHTML = `
                <div style="width:100%;padding-top:140%;background:linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;"></div>
                <div style="padding:10px 12px 14px;">
                    <div style="height:12px;background:#2a2a2a;border-radius:4px;margin-bottom:8px;width:60%;"></div>
                    <div style="height:10px;background:#222;border-radius:4px;width:90%;"></div>
                </div>
            `;
            return div;
        }

        function createCard(entry) {
            const card = document.createElement('div');
            card.className = 'card';

            let imgSrc = null;
            let title = null;
            let imgFailed = false;
            const dmmUrls = getDmmCoverUrl(entry.code);

            // Fetch metadata
            fetch(`https://r18.dev/videos/vod/movies/detail/-/dvd_id=${entry.code}/json`)
                .then(r => r.json())
                .then(data => {
                    if (data?.title) title = data.title;
                    if (data?.images?.jacket_image?.large) imgSrc = data.images.jacket_image.large;
                    else if (data?.images?.jacket_image?.medium) imgSrc = data.images.jacket_image.medium;
                    render();
                })
                .catch(() => {});

            function render() {
                const cover = imgSrc || dmmUrls[0];
                card.innerHTML = `
                    <div class="poster-container">
                        ${cover && !imgFailed ? `
                            <img src="${cover}" data-tried="0" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;" onerror="handleImgError(this)">
                        ` : `
                            <div class="fallback-poster">
                                <div style="font-size:13px;font-weight:800;letter-spacing:2px;color:#E50914;text-align:center;padding:0 12px;">${entry.code}</div>
                                <div style="width:36px;height:2px;background:#E50914;margin-top:8px;border-radius:2px;"></div>
                            </div>
                        `}
                        <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);opacity:0;transition:opacity .22s;pointer-events:none;"></div>
                        <div style="position:absolute;top:8px;left:8px;background:rgba(229,9,20,0.92);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;">${entry.code}</div>
                    </div>
                    <div style="padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:6px;">
                        <div style="font-size:12px;font-weight:600;color:${title?'#e8e8e8':'#666'};line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:34px;">
                            ${title || entry.code}
                        </div>
                        <button class="copy-btn">
                            <span style="font-size:12px;">⎘</span> Copy URL
                        </button>
                    </div>
                `;

                const btn = card.querySelector('.copy-btn');
                btn.onclick = () => {
                    navigator.clipboard.writeText(entry.url).then(() => {
                        btn.textContent = '✓ Copied!';
                        btn.classList.add('success');
                        setTimeout(() => {
                            btn.innerHTML = `<span style="font-size:12px;">⎘</span> Copy URL`;
                            btn.classList.remove('success');
                        }, 2000);
                    });
                };
            }

            window.handleImgError = function(el) {
                let tried = parseInt(el.dataset.tried || 0);
                if (dmmUrls[tried + 1]) {
                    el.dataset.tried = tried + 1;
                    el.src = dmmUrls[tried + 1];
                } else {
                    imgFailed = true;
                    render();
                }
            };

            render();
            return card;
        }

        // Init
        fetch(PLAYLIST_URL)
            .then(r => r.text())
            .then(text => {
                const entries = parseM3U8(text);
                const grid = document.getElementById('grid');
                grid.innerHTML = '';

                entries.forEach(entry => grid.appendChild(createCard(entry)));

                document.getElementById('stats').textContent = `${entries.length} titles`;

                // Search
                document.getElementById('search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = entries.filter(en => en.code.toLowerCase().includes(term));
                    grid.innerHTML = '';
                    filtered.forEach(entry => grid.appendChild(createCard(entry)));
                    document.getElementById('stats').textContent = `${filtered.length} / ${entries.length} titles`;
                });
            })
            .catch(() => {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load playlist.';
            });

        // Show initial skeletons
        window.onload = () => {
            const grid = document.getElementById('grid');
            for (let i = 0; i < 20; i++) grid.appendChild(createSkeleton());
        };
    </script>
</body>
</html>
