<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test - First 5 Videos</title>
    <style>
        body { background:#0f0f0f; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        header { background:#141414; padding:15px; text-align:center; font-size:22px; border-bottom:4px solid #e50914; }
        .main { display:flex; flex:1; overflow:hidden; }
        .player-area { flex:2; background:#000; position:relative; }
        #video { width:100%; height:100%; background:#000; }
        .playlist-area { flex:1; background:#1a1a1a; overflow-y:auto; padding:10px; }
        .item { padding:12px; margin:6px 0; background:#222; cursor:pointer; border-left:4px solid transparent; }
        .item.active { background:#383838; border-left:4px solid #e50914; }
        .status { position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.9); padding:10px 15px; border-radius:6px; font-size:16px; border:2px solid #e50914; display:none; }
        .controls { padding:12px; background:#141414; text-align:center; }
        button { background:#e50914; color:white; border:none; padding:10px 20px; margin:5px; border-radius:4px; font-size:15px; cursor:pointer; }
        .hint { padding:10px; text-align:center; font-size:13px; color:#aaa; background:#141414; }
    </style>
</head>
<body>

    <header>Simple Test Playlist - First 5 Videos</header>

    <div class="main">
        <div class="player-area">
            <video id="video" controls playsinline></video>
            <div class="status" id="status"></div>
        </div>
        <div class="playlist-area" id="playlist"></div>
    </div>

    <div class="hint">Click any title on the right → then press Play/Retry button below</div>

    <div class="controls">
        <button onclick="playCurrent()">▶ Play / Retry</button>
    </div>

    <script>
        const videos = [
            { title: "1. Meet The Sari-Sisters", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Meet%20the%20Sari-Sisters-%20Indian%20Twins%20Share%20Their%20First%20Cock%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "2. Besties And Wives", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Besties%20and%20Wives%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "3. Concept: Demure Wives #2", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/Concept-%20Demure%20Wives%20%232%20(Double%20Vag%20Penetration!)%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "4. You Catfished Your Stepmom", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/You%20Catfished%20Your%20Stepmom.!%20Fuck%20Her%20Ass%20to%20Get%20Rid%20Of%20the%20Tension%20(Alexis%20James'%20Debut)%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" },
            { title: "5. I Finally Fucked My Bully Stepsister", url: "https://file.garden/acn5HxVugnRof3bM/IRL%20Trailers/I%20Finally%20Fucked%20My%20Bully%20Stepsister%20in%20The%20Ass%20-%20Exclusive%20TeamSkeet%20Porn%20Video.mp4" }
        ];

        const videoEl = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const playlistEl = document.getElementById('playlist');

        // Build playlist with very basic method
        function buildList() {
            playlistEl.innerHTML = '';   // clear once
            videos.forEach((vid, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = (i+1) + '. ' + vid.title;
                div.onclick = function() {
                    loadThisVideo(i);
                };
                playlistEl.appendChild(div);
            });
        }

        function loadThisVideo(i) {
            const vid = videos[i];
            statusEl.style.display = 'block';
            statusEl.textContent = 'Loading: ' + vid.title;

            videoEl.src = vid.url;
            videoEl.load();
        }

        function playCurrent() {
            statusEl.textContent = 'Playing...';
            videoEl.play().catch(() => {
                statusEl.textContent = 'Play failed - press Play/Retry again';
            });
        }

        // Start
        window.onload = function() {
            buildList();
            // Auto load first video
            setTimeout(() => loadThisVideo(0), 800);
        };
    </script>
</body>
</html>
