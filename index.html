<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixeldrain Playlist - Number Keys (1-30)</title>
    <style>
        :root {
            --red: #e50914;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #141414;
            padding: 16px 20px;
            text-align: center;
            font-size: 23px;
            font-weight: 600;
            border-bottom: 4px solid var(--red);
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-area {
            flex: 2;
            background: #000;
            position: relative;
        }

        #video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .now-playing {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 500;
            max-width: 65%;
            z-index: 25;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 5px solid var(--red);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 20px 32px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 30;
            display: none;
            text-align: center;
            border: 2px solid var(--red);
        }

        .playlist-area {
            flex: 1;
            background: #1a1a1a;
            overflow-y: auto;
            padding: 12px;
            scroll-behavior: smooth;
            /* Nice smooth scrolling */
        }

        .item {
            padding: 15px 18px;
            margin: 8px 0;
            background: #222;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 4px solid transparent;
        }

        .item:hover {
            background: #333;
            transform: translateX(8px);
        }

        .item.active {
            background: #383838;
            border-left: 4px solid var(--red);
            box-shadow: 0 0 12px rgba(229, 9, 20, 0.4);
        }

        .number {
            font-size: 21px;
            font-weight: bold;
            color: var(--red);
            width: 38px;
            text-align: right;
        }

        .title {
            flex: 1;
            font-size: 15.5px;
            line-height: 1.4;
        }

        .controls {
            padding: 16px;
            background: #141414;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: var(--red);
            color: white;
            border: none;
            padding: 13px 26px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #f40612;
            transform: scale(1.05);
        }

        .hint {
            padding: 12px;
            text-align: center;
            font-size: 14.5px;
            color: #bbb;
            background: #141414;
            border-top: 1px solid #333;
        }

        /* Custom scrollbar */
        .playlist-area::-webkit-scrollbar {
            width: 7px;
        }

        .playlist-area::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>Pixeldrain Playlist • Press 1-30</header>

    <div class="main">
        <div class="player-area">
            <video id="video" controls playsinline></video>

            <!-- Now Playing Title Overlay -->
            <div class="now-playing" id="nowPlaying">
                <span style="color:var(--red);">▶</span>
                <span id="currentTitle">Loading...</span>
            </div>

            <div class="status" id="status">Loading playlist from GitHub...</div>
        </div>

        <div class="playlist-area" id="playlist"></div>
    </div>

    <div class="hint">
        Press <strong>1–30</strong> to jump • Press <strong>0</strong> for Video Fullscreen
    </div>

    <div class="controls">
        <button onclick="prevVideo()">◀ Previous</button>
        <button onclick="playCurrent()">▶ Play / Retry</button>
        <button onclick="nextVideo()">Next ▶</button>
    </div>

    <script>
        const M3U8_URL = "https://raw.githubusercontent.com/Sarker5523/My-Playlists/refs/heads/main/tv_series.m3u8";

        let playlist = [];
        let currentIndex = 0;
        let numberBuffer = '';
        let numberTimeout = null;

        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const nowPlayingEl = document.getElementById('nowPlaying');
        const currentTitleEl = document.getElementById('currentTitle');
        const playlistContainer = document.getElementById('playlist');

        async function loadPlaylist() {
            statusEl.style.display = "block";
            statusEl.textContent = "Fetching playlist...";

            try {
                const res = await fetch(M3U8_URL);
                const text = await res.text();
                const lines = text.split('\n');
                playlist = [];

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        const title = lines[i].split(',').slice(1).join(',').trim();
                        const url = lines[i + 1] ? lines[i + 1].trim() : '';
                        if (url && !url.startsWith('#')) {
                            playlist.push({ title: title || `Video ${playlist.length + 1}`, url: url });
                        }
                    }
                }

                renderPlaylist();
                loadVideo(0);
            } catch (e) {
                statusEl.textContent = "Failed to load playlist. Check connection.";
            }
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';

            playlist.forEach((item, i) => {
                const num = (i + 1).toString().padStart(2, '0');
                const div = document.createElement('div');
                div.className = `item ${i === currentIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="number">${num}</span>
                    <span class="title">${item.title}</span>
                `;
                div.onclick = () => loadVideo(i);
                playlistContainer.appendChild(div);
            });
        }

        function scrollToActive() {
            const activeItem = playlistContainer.querySelector('.item.active');
            if (activeItem) {
                activeItem.scrollIntoView({
                    behavior: "smooth",
                    block: "center"   // centers the item in the playlist
                });
            }
        }

        function showNowPlaying() {
            if (playlist.length === 0) return;
            currentTitleEl.textContent = playlist[currentIndex].title;
            nowPlayingEl.style.display = 'flex';

            setTimeout(() => {
                nowPlayingEl.style.display = 'none';
            }, 4000);
        }

        function loadVideo(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const item = playlist[index];

            renderPlaylist();
            scrollToActive();        // ← Added: Auto-scroll to current video
            showNowPlaying();

            statusEl.textContent = `Loading ${index + 1}: ${item.title}`;
            statusEl.style.display = 'block';

            video.src = item.url;
            video.load();
        }

        function playCurrent() {
            video.play().catch(() => {
                statusEl.textContent = "Press Play again";
            });
        }

        function nextVideo() {
            let next = currentIndex + 1;
            if (next >= playlist.length) next = 0;
            loadVideo(next);
        }

        function prevVideo() {
            let prev = currentIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            loadVideo(prev);
        }

        // Keyboard handling
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (/^\d$/.test(key)) {
                numberBuffer += key;

                if (numberTimeout) clearTimeout(numberTimeout);

                if (key === '0' && numberBuffer === '0') {
                    if (video.requestFullscreen) video.requestFullscreen();
                    else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                    else if (video.msRequestFullscreen) video.msRequestFullscreen();
                    numberBuffer = '';
                    return;
                }

                if (numberBuffer.length === 2 || (numberBuffer.length === 1 && parseInt(numberBuffer) > 9)) {
                    processNumberInput();
                } else {
                    numberTimeout = setTimeout(processNumberInput, 900);
                }
                return;
            }

            if (key === "ArrowRight") nextVideo();
            if (key === "ArrowLeft") prevVideo();
            if (key === " ") {
                e.preventDefault();
                video.paused ? video.play() : video.pause();
            }
        });

        function processNumberInput() {
            if (numberBuffer === '') return;

            let num = parseInt(numberBuffer);
            numberBuffer = '';

            if (num >= 1 && num <= playlist.length) {
                loadVideo(num - 1);
            } else if (num !== 0) {
                statusEl.textContent = `Invalid number: ${num}`;
                statusEl.style.display = 'block';
                setTimeout(() => {
                    if (statusEl.textContent.includes('Invalid')) statusEl.style.display = 'none';
                }, 2000);
            }
        }

        // Video events
        video.addEventListener('loadeddata', () => {
            statusEl.style.display = 'none';
            video.play().catch(() => { });
            showNowPlaying();
        });

        video.addEventListener('error', () => {
            statusEl.style.display = 'block';
            statusEl.innerHTML = `Failed to play video ${currentIndex + 1}.<br>Try again.`;
        });

        video.addEventListener('ended', nextVideo);

        // Start the app
        window.onload = loadPlaylist;
    </script>
</body>

</html>
